abstract: Deep learning with convolutional neural networks (deep ConvNets) has revolutionized computer vision through end-to-end
  learning. This study investigates deep ConvNets for end-to-end EEG decoding of imagined or executed movements from raw EEG.
  Results show that recent advances including batch normalization and exponential linear units, together with a cropped training
  strategy, boosted decoding performance to match or exceed FBCSP (82.1% FBCSP vs 84.0% deep ConvNets). Novel visualization
  methods demonstrated that ConvNets learned to use spectral power modulations in alpha, beta, and high gamma frequencies
  with meaningful spatial distributions.
