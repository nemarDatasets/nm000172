methodology: End-to-end deep learning approach comparing shallow ConvNets, deep ConvNets, and ResNets against FBCSP baseline.
  Evaluated design choices including batch normalization, exponential linear units, dropout, and cropped training strategies.
  Novel visualization techniques developed to understand learned features and verify that ConvNets use spectral power modulations
  in task-relevant frequency bands.
